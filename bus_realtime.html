<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>653번 버스 실시간 안내</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --green:#10b981;--red:#ef4444;--yellow:#fbbf24;
  --gray:#94a3b8;--bg:#f8fafc;--txt:#1f2937;--muted:#6b7280;
  --panel:rgba(255,255,255,0.97);
}
body{
  font-family:'Outfit',-apple-system,BlinkMacSystemFont,sans-serif;
  background:#dde3ec;
  display:flex;justify-content:center;align-items:center;
  min-height:100vh;min-height:100dvh;
}
.app{
  width:100%;max-width:400px;height:100vh;height:100dvh;
  max-height:820px;
  background:var(--bg);
  position:relative;border-radius:28px;overflow:hidden;
  box-shadow:0 32px 64px -12px rgba(0,0,0,.2);
  display:flex;flex-direction:column;
}
/* Header */
header{
  position:absolute;top:0;left:0;right:0;z-index:500;
  padding:20px 20px 10px;
  background:linear-gradient(180deg,rgba(255,255,255,.96) 60%,rgba(255,255,255,0));
  pointer-events:none;
}
header h1{
  font-size:20px;font-weight:800;text-align:center;
  color:var(--txt);letter-spacing:-.3px;
}
/* Map */
#map{flex:1;width:100%;z-index:1}
.leaflet-control-attribution,.leaflet-control-zoom{display:none!important}
/* LP Player */
.lp-wrap{
  position:absolute;top:72px;right:16px;z-index:600;
  display:flex;align-items:center;gap:10px;
}
.lp-disc{
  width:68px;height:68px;border-radius:50%;
  border:3px solid #111;overflow:hidden;cursor:pointer;
  box-shadow:0 4px 14px rgba(0,0,0,.28);
  position:relative;background:#000;flex-shrink:0;
  transition:transform .2s;
}
.lp-disc:active{transform:scale(.95)}
.lp-disc img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.lp-disc::after{
  content:'';position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:15px;height:15px;background:#111;border-radius:50%;
  border:1.5px solid #333;z-index:2;
}
.lp-disc.spin{animation:lp-spin 4s linear infinite}
@keyframes lp-spin{to{transform:rotate(360deg)}}
.lp-ctrl{
  background:rgba(255,255,255,.93);backdrop-filter:blur(10px);
  border-radius:20px;padding:6px 14px;
  display:flex;align-items:center;gap:10px;
  box-shadow:0 4px 12px rgba(0,0,0,.12);
  opacity:0;transform:translateX(12px);pointer-events:none;
  transition:all .3s cubic-bezier(.4,0,.2,1);
}
.lp-ctrl.show{opacity:1;transform:translateX(0);pointer-events:auto}
.lp-title{font-size:12px;font-weight:700;color:var(--txt);max-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn-lp{background:none;border:none;cursor:pointer;font-size:18px;color:#4b5563;padding:2px;line-height:1}
/* Footer */
footer{
  position:absolute;bottom:0;left:0;right:0;z-index:500;
  padding:12px 14px 18px;
  background:linear-gradient(0deg,rgba(255,255,255,.98) 70%,rgba(255,255,255,0));
  pointer-events:none;
}
.panel{
  background:var(--panel);backdrop-filter:blur(16px);
  border:1px solid rgba(0,0,0,.06);border-radius:20px;
  padding:14px 16px;
  box-shadow:0 8px 24px rgba(0,0,0,.09);
  pointer-events:auto;
}
.panel-lbl{font-size:13px;color:var(--muted);font-weight:600;text-align:center;margin-bottom:10px}
.time-row{
  display:flex;background:#f1f5f9;border-radius:14px;
  padding:12px 8px;margin-bottom:10px;gap:4px;
}
.time-block{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.time-block .lbl{font-size:11px;font-weight:700;color:var(--muted);text-align:center;line-height:1.4}
.time-block .val{
  font-size:28px;font-weight:800;line-height:1;
  color:var(--txt);transition:color .4s;
}
.time-block .val.green{color:var(--green)}
.time-block .val.red{color:var(--red)}
.time-block .sub{font-size:10px;color:var(--muted);font-weight:500;text-align:center}
.divider{width:1px;background:#e2e8f0;align-self:stretch;margin:0 4px}
.panel-foot{display:flex;justify-content:space-between;align-items:center}
.live-dot{display:inline-block;width:7px;height:7px;background:var(--green);border-radius:50%;margin-right:5px;animation:ldot 1.5s infinite}
@keyframes ldot{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.5)}70%{box-shadow:0 0 0 5px rgba(16,185,129,0)}}
.live-txt{font-size:12px;color:var(--muted);font-weight:600}
.btn-rf{
  background:#fff;color:var(--txt);border:1px solid #d1d5db;
  padding:5px 12px;border-radius:8px;cursor:pointer;
  font-size:12px;font-weight:700;font-family:inherit;
  transition:background .2s;
}
.btn-rf:active{background:#f3f4f6}
/* Loading */
.loading{
  position:absolute;inset:0;z-index:900;
  background:rgba(255,255,255,.8);backdrop-filter:blur(6px);
  display:flex;flex-direction:column;justify-content:center;align-items:center;gap:10px;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.loading.on{opacity:1;pointer-events:auto}
.spin-ring{
  width:34px;height:34px;border:4px solid #e2e8f0;
  border-top-color:#3b82f6;border-radius:50%;
  animation:spin-r .7s linear infinite;
}
@keyframes spin-r{to{transform:rotate(360deg)}}
.loading p{font-size:13px;font-weight:700;color:#3b82f6}
/* Demo banner */
#demo-banner{
  position:absolute;top:0;left:0;right:0;z-index:1000;
  background:linear-gradient(90deg,#f59e0b,#ef4444);
  color:#fff;text-align:center;padding:6px 12px;
  font-size:11px;font-weight:700;letter-spacing:.2px;
  border-radius:28px 28px 0 0;
}
/* Map custom markers */
.stn-icon,.bus-icon{background:transparent!important;border:none!important;box-shadow:none!important}
.stn-label{
  font-family:'Outfit',sans-serif;font-weight:800;font-size:12px;
  color:#1f2937;text-align:center;white-space:nowrap;
  text-shadow:1px 1px 0 #fff,-1px -1px 0 #fff,1px -1px 0 #fff,-1px 1px 0 #fff,0 1px 0 #fff,0 -1px 0 #fff,1px 0 0 #fff,-1px 0 0 #fff;
}
.stn-badge{
  display:inline-block;padding:2px 8px;border-radius:8px;
  font-size:11px;font-weight:800;background:rgba(255,255,255,.95);
  box-shadow:0 2px 6px rgba(0,0,0,.14);margin-bottom:3px;
}
.stn-badge.up{color:#2563eb;border:1.5px solid #2563eb}
.stn-badge.dn{color:#ea580c;border:1.5px solid #ea580c}
.bus-wrap{display:flex;flex-direction:column;align-items:center;pointer-events:none}
.bus-bubble{
  padding:4px 10px;border-radius:16px;
  font-family:'Outfit',sans-serif;font-weight:800;font-size:13px;
  margin-bottom:4px;box-shadow:0 3px 10px rgba(0,0,0,.18);
  white-space:nowrap;position:relative;
}
.bus-bubble::after{
  content:'';position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);
  border:5px solid transparent;
}
.bus-bubble.grn{background:var(--green);color:#fff}
.bus-bubble.grn::after{border-top-color:var(--green)}
.bus-bubble.red{background:var(--red);color:#fff;animation:bpulse 1.5s infinite}
.bus-bubble.red::after{border-top-color:var(--red)}
@keyframes bpulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)}70%{box-shadow:0 0 0 9px rgba(239,68,68,0)}}
</style>
</head>
<body>
<div id="ytplayer" style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none"></div>

<div class="app" id="app">
  <!-- LP Player -->
  <div class="lp-wrap">
    <div class="lp-disc" id="lp" onclick="toggleCtrl()">
      <img id="lpImg" src="https://img.youtube.com/vi/0KBtBd7BPvU/hqdefault.jpg" alt="cover">
    </div>
    <div class="lp-ctrl" id="lpCtrl">
      <span class="lp-title" id="lpTitle">KIDO - 꼬르륵</span>
      <button class="btn-lp" id="btnPP" onclick="togglePlay()">▶</button>
      <button class="btn-lp" onclick="nextTrack()">⏭</button>
    </div>
  </div>

  <header><h1>653번 버스 실시간 안내</h1></header>
  <div id="map"></div>
  <div class="loading on" id="loading"><div class="spin-ring"></div><p id="loadMsg">경로 불러오는 중…</p></div>

  <footer>
    <div class="panel">
      <div class="panel-lbl">탑승 정류장 버스 도착 예정</div>
      <div class="time-row">
        <div class="time-block">
          <span class="lbl">🏥 강서한방병원<br>(출근)</span>
          <div class="val" id="tUp">— 분</div>
          <div class="sub" id="sUp">대기 중</div>
        </div>
        <div class="divider"></div>
        <div class="time-block">
          <span class="lbl">🏢 로옴코리아<br>(퇴근)</span>
          <div class="val" id="tDn">— 분</div>
          <div class="sub" id="sDn">대기 중</div>
        </div>
      </div>
      <div class="panel-foot">
        <span class="live-txt"><span class="live-dot"></span>실시간 연동 중</span>
        <button class="btn-rf" onclick="fetchBus()">🔄 새로고침</button>
      </div>
    </div>
  </footer>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script src="https://www.youtube.com/iframe_api"></script>
<script>
// ═══════════════════════════════════
// YouTube
// ═══════════════════════════════════
var TRACKS=[{id:'0KBtBd7BPvU',title:'KIDO - 꼬르륵 (Grr)'},{id:'ewKey4CQRdk',title:'KIDO - I told you'}];
var ytP,playing=false;
function onYouTubeIframeAPIReady(){
  ytP=new YT.Player('ytplayer',{height:'1',width:'1',
    playerVars:{autoplay:0,controls:0,disablekb:1,fs:0,rel:0,modestbranding:1},
    events:{
      onReady:function(e){
        ytP.loadPlaylist({playlist:TRACKS.map(function(t){return t.id})});
        ytP.setLoop(true);ytP.setVolume(100);
        setTimeout(function(){if(!playing&&ytP.playVideo)ytP.playVideo();},800);
        function go(){if(!playing&&ytP&&ytP.playVideo)ytP.playVideo();}
        document.addEventListener('click',go,{once:true});
        document.addEventListener('touchstart',go,{once:true,passive:true});
      },
      onStateChange:function(e){
        var btn=document.getElementById('btnPP'),lp=document.getElementById('lp');
        var img=document.getElementById('lpImg'),nm=document.getElementById('lpTitle');
        if(e.data===YT.PlayerState.PLAYING){
          playing=true;btn.textContent='⏸';lp.classList.add('spin');
          var idx=ytP.getPlaylistIndex();
          if(TRACKS[idx]){nm.textContent=TRACKS[idx].title;img.src='https://img.youtube.com/vi/'+TRACKS[idx].id+'/hqdefault.jpg';}
        } else {playing=false;btn.textContent='▶';lp.classList.remove('spin');}
      },
      onError:function(e){console.warn('YT err',e.data);}
    }
  });
}
function togglePlay(){if(!ytP)return;playing?ytP.pauseVideo():ytP.playVideo();}
function nextTrack(){if(ytP&&ytP.nextVideo)ytP.nextVideo();}
function toggleCtrl(){document.getElementById('lpCtrl').classList.toggle('show');}

// ═══════════════════════════════════
// 설정
// ═══════════════════════════════════
var SVC_KEY='556f51685a656f64333561785a7054';
var ROUTE_ID='100100098';   // 653번
var ARS_UP='16328';          // 강서한방병원
var ARS_DN='18109';          // 로옴코리아
var COORD_UP=[37.5301,126.8390];
var COORD_DN=[37.4795,126.8800];
var DEMO_MAX=1800;

// ═══════════════════════════════════
// 지도 초기화
// ═══════════════════════════════════
var map=L.map('map',{zoomControl:false,attributionControl:false}).setView([37.505,126.860],13);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:19,crossOrigin:true}).addTo(map);

// 노선 레이어 3개 (앞 회색 / 사이 노랑 / 뒤 회색)
var polyBefore = L.polyline([], {color:'#94a3b8',weight:5,opacity:.7}).addTo(map);
var polyMiddle = L.polyline([], {color:'#fbbf24',weight:6,opacity:1}).addTo(map);
var polyAfter  = L.polyline([], {color:'#94a3b8',weight:5,opacity:.7}).addTo(map);

// 정류장 마커
function mkStn(html,ll,anchor){
  return L.marker(ll,{icon:L.divIcon({className:'stn-icon',html:html,iconAnchor:anchor,iconSize:[120,50]})}).addTo(map);
}
mkStn("<div class='stn-label'><div class='stn-badge up'>📍 출근 탑승</div><div>강서한방병원</div></div>",COORD_UP,[60,-4]);
mkStn("<div class='stn-label'><div class='stn-badge dn'>📍 퇴근 탑승</div><div>로옴코리아</div></div>",COORD_DN,[60,50]);

// ═══════════════════════════════════
// 경로 데이터
// ═══════════════════════════════════
var routeAll=[];
var segBefore=[]; // 출발지 ~ 강서한방병원
var segMiddle=[]; // 강서한방병원 ~ 로옴코리아
var segAfter=[];  // 로옴코리아 ~ 종점

async function loadOSRM(){
  setMsg('실제 도로 경로 불러오는 중…');
  try{
    // 출발(강서구) → 강서한방병원 → 로옴코리아 (방향 맞춤)
    var url='https://router.project-osrm.org/route/v1/driving/126.8270,37.5510;126.8390,37.5301;126.8800,37.4795?geometries=geojson&overview=full';
    var r=await fetch(url);var d=await r.json();
    var c=d.routes[0].geometry.coordinates.map(function(p){return[p[1],p[0]];});
    routeAll=c;
    function near(t){var mi=Infinity,idx=0;c.forEach(function(p,i){var d=Math.hypot(p[0]-t[0],p[1]-t[1]);if(d<mi){mi=d;idx=i;}});return idx;}
    var i1=near(COORD_UP), i2=near(COORD_DN);
    segBefore=c.slice(0,i1+1);
    segMiddle=c.slice(i1,i2+1);
    segAfter =c.slice(i2);
    polyBefore.setLatLngs(segBefore);
    polyMiddle.setLatLngs(segMiddle);
    polyAfter.setLatLngs(segAfter);
    map.fitBounds(L.latLngBounds(c),{padding:[60,60]});
  } catch(e){
    console.warn('OSRM 실패, 직선 경로 사용',e);
    var ext=[37.5510,126.8270];
    segBefore=[ext,COORD_UP]; segMiddle=[COORD_UP,COORD_DN]; segAfter=[COORD_DN,[37.460,126.895]];
    routeAll=[ext,COORD_UP,COORD_DN,[37.460,126.895]];
    polyBefore.setLatLngs(segBefore); polyMiddle.setLatLngs(segMiddle); polyAfter.setLatLngs(segAfter);
    map.fitBounds(L.latLngBounds([ext,COORD_UP,COORD_DN]),{padding:[60,60]});
  }
}

// ═══════════════════════════════════
// 좌표 보간
// ═══════════════════════════════════
function interpPath(seg,ratio){
  if(!seg||seg.length===0)return COORD_UP;
  ratio=Math.max(0,Math.min(1,ratio));
  if(ratio===0)return seg[0];
  if(ratio===1)return seg[seg.length-1];
  var total=0,dists=[];
  for(var i=0;i<seg.length-1;i++){
    var d=Math.hypot(seg[i+1][0]-seg[i][0],seg[i+1][1]-seg[i][1]);
    total+=d;dists.push(d);
  }
  var tgt=total*ratio,cur=0;
  for(var i=0;i<seg.length-1;i++){
    if(cur+dists[i]>=tgt){
      var r=(tgt-cur)/dists[i];
      return[seg[i][0]+(seg[i+1][0]-seg[i][0])*r, seg[i][1]+(seg[i+1][1]-seg[i][1])*r];
    }
    cur+=dists[i];
  }
  return seg[seg.length-1];
}

// ═══════════════════════════════════
// 버스 데이터
// ═══════════════════════════════════
var busData=[];
var busMarkers={};

// 프록시 목록 (카카오톡 인앱 브라우저 포함 다양한 환경 대응)
var PROXIES=[
  function(u){return 'https://corsproxy.io/?'+encodeURIComponent(u);},
  function(u){return 'https://api.codetabs.com/v1/proxy?quest='+encodeURIComponent(u);}
];

async function proxyGet(rawUrl){
  for(var i=0;i<PROXIES.length;i++){
    try{
      var ctrl=new AbortController();
      var tid=setTimeout(function(){ctrl.abort();},7000);
      var res=await fetch(PROXIES[i](rawUrl),{signal:ctrl.signal});
      clearTimeout(tid);
      if(!res.ok)continue;
      var txt=await res.text();
      // allorigins wrapper 처리
      try{var w=JSON.parse(txt);if(w.contents)return JSON.parse(w.contents);} catch(e2){}
      return JSON.parse(txt);
    } catch(e){console.warn('proxy '+i+' fail',e);}
  }
  throw new Error('모든 프록시 실패');
}

async function fetchArrival(arsId){
  var url='http://ws.bus.go.kr/api/rest/stationinfo/getStationByUid?ServiceKey='+SVC_KEY+'&arsId='+arsId+'&resultType=json';
  var d=await proxyGet(url);
  if(d.msgHeader&&d.msgHeader.headerCd!=='0')throw new Error(d.msgHeader.headerMsg);
  return d.msgBody&&d.msgBody.itemList?d.msgBody.itemList:[];
}

async function fetchBus(){
  setMsg('실시간 데이터 불러오는 중…');
  document.getElementById('loading').classList.add('on');
  try{
    var results=await Promise.allSettled([fetchArrival(ARS_UP),fetchArrival(ARS_DN)]);
    var upItems=results[0].status==='fulfilled'?results[0].value:[];
    var dnItems=results[1].status==='fulfilled'?results[1].value:[];
    var list=[];

    var filterBus=function(items,dir){
      var f=items.filter(function(i){return i.busRouteId===ROUTE_ID||i.rtNm==='653';});
      f.forEach(function(item,idx){
        var t1=parseInt(item.traTime1)||0, t2=parseInt(item.traTime2)||0;
        if(t1>0)list.push({id:dir+'_1_'+idx,sec:t1,dir:dir,stNm:item.stNm||''});
        if(t2>0)list.push({id:dir+'_2_'+idx,sec:t2,dir:dir,stNm:item.stNm||''});
      });
    };
    filterBus(upItems,'up');
    filterBus(dnItems,'dn');

    if(list.length>0){
      busData=list;hideBanner();
      console.log('✅ 실시간 연동 성공',list);
    } else {
      console.warn('⚠️ 653번 데이터 없음, 데모 유지');
      showBanner();
    }
  } catch(e){
    console.error('❌ API 실패',e);showBanner();
  } finally {
    document.getElementById('loading').classList.remove('on');
    render();
  }
}

// ═══════════════════════════════════
// 렌더링
// ═══════════════════════════════════
function render(){
  var active=busData.filter(function(b){return b.sec>=0;});
  var ids=active.map(function(b){return b.id;});
  // 사라진 마커 제거
  Object.keys(busMarkers).forEach(function(k){
    if(ids.indexOf(k)<0){map.removeLayer(busMarkers[k]);delete busMarkers[k];}
  });

  var fastUp=active.filter(function(b){return b.dir==='up';}).sort(function(a,b){return a.sec-b.sec;})[0];
  var fastDn=active.filter(function(b){return b.dir==='dn';}).sort(function(a,b){return a.sec-b.sec;})[0];

  updatePanel('up',fastUp);
  updatePanel('dn',fastDn);

  active.forEach(function(bus){
    var mins=Math.max(0,Math.floor(bus.sec/60));
    var isRed=mins<=5;
    var cls=isRed?'red':'grn';
    var label=isRed?('🚨 '+mins+'분'):(mins+'분');

    // 버스 위치: 남은시간 비율로 역산 (경로 시작=멀리, 끝=정류장)
    var ratio=Math.max(0.02,Math.min(0.97, 1-(bus.sec/DEMO_MAX)));
    var seg=bus.dir==='up'?segBefore:segMiddle;
    var pos=interpPath(seg,ratio);

    var svgColor=isRed?'#ef4444':'#10b981';
    var html='<div class="bus-wrap">'
      +'<div class="bus-bubble '+cls+'">'+label+'</div>'
      +'<svg width="36" height="44" viewBox="0 0 40 50" fill="none" xmlns="http://www.w3.org/2000/svg">'
      +'<path d="M20 0C8.954 0 0 8.954 0 20C0 35 20 50 20 50S40 35 40 20C40 8.954 31.046 0 20 0Z" fill="'+svgColor+'"/>'
      +'<circle cx="20" cy="20" r="13" fill="white" fill-opacity="0.2"/>'
      +'<path d="M12 16h16v9H12zM14 26a2 2 0 100-4 2 2 0 000 4zm12 0a2 2 0 100-4 2 2 0 000 4z" fill="white"/>'
      +'</svg></div>';

    var icon=L.divIcon({className:'bus-icon',html:html,iconSize:[56,76],iconAnchor:[28,72]});
    if(!busMarkers[bus.id]){
      busMarkers[bus.id]=L.marker(pos,{icon:icon,zIndexOffset:100}).addTo(map);
    } else {
      busMarkers[bus.id].setLatLng(pos);
      busMarkers[bus.id].setIcon(icon);
    }
  });
}

function updatePanel(dir,bus){
  var tEl=document.getElementById(dir==='up'?'tUp':'tDn');
  var sEl=document.getElementById(dir==='up'?'sUp':'sDn');
  if(bus){
    var m=Math.max(0,Math.floor(bus.sec/60));
    var s=bus.sec%60;
    tEl.textContent=m>0?(m+'분'):(s+'초');
    tEl.className='val '+(m<=5?'red':'green');
    sEl.textContent=bus.stNm?('현재: '+bus.stNm):(m<=5?'⚠️ 곧 도착':'정상 운행');
  } else {
    tEl.textContent='—';tEl.className='val';sEl.textContent='정보 없음';
  }
}

    {id:'d_up1',sec:240, dir:'up',stNm:'화곡역', _demo:true},
    {id:'d_up2',sec:850, dir:'up',stNm:'우장산역',_demo:true},
    {id:'d_dn1',sec:300, dir:'dn',stNm:'가산디지털단지',_demo:true},
    {id:'d_dn2',sec:1050,dir:'dn',stNm:'남구로역',_demo:true}
  ];
}

setInterval(function(){
  busData.forEach(function(b){
    if(b.sec>0)b.sec--;
    if(b._demo&&b.sec<=0)b.sec=DEMO_MAX;
  });
  render();
},1000);

setInterval(fetchBus,30000);

// 유틸

function showBanner(){
  var b=document.getElementById('demo-banner');
  if(b)return;
  b=document.createElement('div');b.id='demo-banner';
  var now=new Date(),s=new Date(now.getTime()+2*3600000);
  var hh=String(s.getHours()).padStart(2,'0'),mm=String(s.getMinutes()).padStart(2,'0');
  b.textContent='🚌 데모 모드 | API 동기화 예상: '+hh+':'+mm+' (최대 24시간 이내)';
  document.getElementById('app').prepend(b);
}
function hideBanner(){var b=document.getElementById('demo-banner');if(b)b.remove();}
function setMsg(t){document.getElementById('loadMsg').textContent=t;}

// 앱 시작
// ═══════════════════════════════════
async function init(){
  await loadOSRM();
  initDemo();
  showBanner();
  render();
  await fetchBus();
}
init();
</script>
