<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>실시간 버스 위치 안내</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
    :root {
      --bg:#f8fafc; --panel:rgba(255,255,255,0.95); --primary:#3b82f6;
      --txt:#1f2937; --muted:#6b7280; --green:#10b981; --red:#ef4444;
    }
    *{box-sizing:border-box;font-family:'Outfit',-apple-system,sans-serif;margin:0;padding:0}
    body{background:#e2e8f0;display:flex;justify-content:center;align-items:center;min-height:100vh}
    .app{width:100%;max-width:400px;height:800px;max-height:100vh;background:var(--bg);position:relative;border-radius:24px;overflow:hidden;box-shadow:0 25px 50px -12px rgba(0,0,0,.15);display:flex;flex-direction:column}
    /* Header */
    header{padding:24px 20px 16px;background:linear-gradient(180deg,rgba(255,255,255,.9),rgba(255,255,255,0));position:absolute;top:0;left:0;right:0;z-index:1000;pointer-events:none;text-align:center}
    h1{font-size:22px;font-weight:700;color:#1f2937;text-shadow:2px 2px 4px rgba(255,255,255,.8)}
    /* Map */
    #map{flex:1;width:100%;height:100%;z-index:1}
    .leaflet-control-attribution{display:none}
    /* Footer */
    footer{position:absolute;bottom:0;left:0;right:0;padding:16px 16px 20px;background:linear-gradient(0deg,rgba(255,255,255,.95) 70%,rgba(255,255,255,0));z-index:1000;pointer-events:none}
    .info-box{background:var(--panel);backdrop-filter:blur(16px);border:1px solid rgba(0,0,0,.05);border-radius:20px;padding:16px 18px;box-shadow:0 10px 30px rgba(0,0,0,.1);pointer-events:auto}
    .info-label{font-size:14px;color:var(--muted);font-weight:500;text-align:center;margin-bottom:10px}
    .time-row{display:flex;justify-content:space-around;background:#f1f5f9;border-radius:12px;padding:12px 8px;margin-bottom:12px;gap:8px}
    .time-block{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
    .time-block .lbl{font-size:11px;font-weight:600;color:var(--muted);text-align:center;line-height:1.4}
    .time-block .val{font-size:26px;font-weight:800;color:var(--txt);transition:color .3s}
    .time-block .val.green{color:var(--green)}
    .time-block .val.red{color:var(--red)}
    .time-block .sub{font-size:11px;color:var(--muted);font-weight:500}
    .divider{width:1px;background:#e2e8f0;align-self:stretch}
    .footer-ctrl{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted);font-weight:500}
    .pulse-dot{display:inline-block;width:8px;height:8px;background:var(--green);border-radius:50%;margin-right:6px;animation:pdot 1.5s infinite}
    @keyframes pdot{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.5)}70%{box-shadow:0 0 0 5px rgba(16,185,129,0)}}
    .btn-rf{background:#fff;color:var(--txt);border:1px solid #d1d5db;padding:5px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;transition:background .2s}
    .btn-rf:hover{background:#f3f4f6}
    /* Loading */
    .loading{position:absolute;inset:0;background:rgba(255,255,255,.75);z-index:3000;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:12px;backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .3s}
    .loading.on{opacity:1;pointer-events:auto}
    .spin{width:36px;height:36px;border:4px solid #e2e8f0;border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading p{font-size:14px;font-weight:600;color:var(--primary)}
    /* LP Player */
    .yt-wrap{position:absolute;top:80px;right:16px;z-index:1001;display:flex;align-items:center;gap:10px}
    .lp{width:72px;height:72px;border-radius:50%;border:3px solid #111;overflow:hidden;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.3);position:relative;background:#000;flex-shrink:0}
    .lp::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:16px;height:16px;background:#111;border-radius:50%;border:1px solid #333;z-index:2}
    .lp img{width:100%;height:100%;object-fit:cover}
    .lp.spin-lp{animation:lpspin 4s linear infinite}
    @keyframes lpspin{to{transform:rotate(360deg)}}
    .player-ctrl{background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border-radius:20px;padding:6px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 4px 12px rgba(0,0,0,.15);opacity:0;transform:translateX(16px);pointer-events:none;transition:all .3s}
    .player-ctrl.show{opacity:1;transform:translateX(0);pointer-events:auto}
    .song-nm{font-size:13px;font-weight:700;color:#1f2937;max-width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .btn-p{background:none;border:none;color:#4b5563;cursor:pointer;font-size:18px;padding:4px;transition:color .2s}
    .btn-p:hover{color:#111}
    /* Map markers */
    .custom-icon,.stn-icon{background:transparent!important;border:none!important}
    .stn-label{font-weight:700;font-size:13px;color:#1f2937;text-align:center;width:max-content;text-shadow:1px 1px 0 #fff,-1px -1px 0 #fff,1px -1px 0 #fff,-1px 1px 0 #fff;line-height:1.4}
    .stn-label .badge{display:inline-block;padding:2px 7px;border-radius:6px;font-size:12px;background:rgba(255,255,255,.95);box-shadow:0 1px 4px rgba(0,0,0,.12);margin-bottom:3px}
    .badge.up{color:#2563eb;border:1px solid #2563eb}
    .badge.dn{color:#ea580c;border:1px solid #ea580c}
    .bus-marker{display:flex;flex-direction:column;align-items:center}
    .bus-bubble{padding:5px 11px;border-radius:20px;font-weight:800;font-size:13px;margin-bottom:5px;box-shadow:0 3px 10px rgba(0,0,0,.15);white-space:nowrap;position:relative}
    .bus-bubble::after{content:'';position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:inherit}
    .bus-bubble.grn{background:var(--green);color:#fff;border-top-color:var(--green)}
    .bus-bubble.grn::after{border-top-color:var(--green)}
    .bus-bubble.red{background:var(--red);color:#fff;animation:bpulse 1.5s infinite}
    .bus-bubble.red::after{border-top-color:var(--red)}
    @keyframes bpulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)}70%{box-shadow:0 0 0 10px rgba(239,68,68,0)}}
    /* Demo banner */
    #demo-banner{position:fixed;top:0;left:0;right:0;z-index:9999;background:linear-gradient(90deg,#f59e0b,#ef4444);color:#fff;text-align:center;padding:7px 16px;font-size:12px;font-weight:600;box-shadow:0 2px 8px rgba(0,0,0,.25)}
  </style>
</head>
<body>
<div id="ytplayer" style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none"></div>

<div class="app">
  <!-- LP Player -->
  <div class="yt-wrap">
    <div class="lp" id="lp" onclick="toggleCtrl()">
      <img id="lpImg" src="https://img.youtube.com/vi/0KBtBd7BPvU/hqdefault.jpg" alt="cover">
    </div>
    <div class="player-ctrl" id="pCtrl">
      <span class="song-nm" id="songNm">KIDO - 꼬르륵</span>
      <button class="btn-p" id="btnPP" onclick="togglePlay()">▶</button>
      <button class="btn-p" onclick="nextTrack()">⏭</button>
    </div>
  </div>

  <header><h1>653번 버스 실시간 안내</h1></header>

  <div id="map"></div>

  <div class="loading on" id="loading">
    <div class="spin"></div>
    <p id="loadTxt">지도 경로 불러오는 중…</p>
  </div>

  <footer>
    <div class="info-box">
      <div class="info-label">탑승 정류장 버스 도착 예정</div>
      <div class="time-row">
        <div class="time-block">
          <span class="lbl">🏥 강서한방병원<br>(출근)</span>
          <div class="val" id="t-up">— 분</div>
          <div class="sub" id="s-up">다음 버스</div>
        </div>
        <div class="divider"></div>
        <div class="time-block">
          <span class="lbl">🏢 로옴코리아<br>(퇴근)</span>
          <div class="val" id="t-dn">— 분</div>
          <div class="sub" id="s-dn">다음 버스</div>
        </div>
      </div>
      <div class="footer-ctrl">
        <span><span class="pulse-dot"></span>실시간 API 연동 중</span>
        <button class="btn-rf" onclick="fetchBus()">🔄 새로고침</button>
      </div>
    </div>
  </footer>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script src="https://www.youtube.com/iframe_api"></script>
<script>
// ════════════════════════════════════════════════
//  YouTube Player
// ════════════════════════════════════════════════
const TRACKS = [
  { id:'0KBtBd7BPvU', title:'KIDO - 꼬르륵 (Grr)' },
  { id:'ewKey4CQRdk', title:'KIDO - I told you' }
];
let ytP, playing=false;
function onYouTubeIframeAPIReady(){
  ytP = new YT.Player('ytplayer',{
    height:'1',width:'1',
    playerVars:{autoplay:0,controls:0,disablekb:1,fs:0,rel:0,modestbranding:1},
    events:{onReady:e=>{
      ytP.loadPlaylist({playlist:TRACKS.map(t=>t.id)});
      ytP.setLoop(true); ytP.setVolume(100);
      setTimeout(()=>{ if(!playing) ytP.playVideo(); },800);
      const go=()=>{ if(!playing&&ytP.playVideo) ytP.playVideo(); };
      document.addEventListener('click',go,{once:true});
      document.addEventListener('touchstart',go,{once:true});
    },
    onStateChange:e=>{
      const btn=document.getElementById('btnPP'), lp=document.getElementById('lp');
      const img=document.getElementById('lpImg'), nm=document.getElementById('songNm');
      if(e.data===YT.PlayerState.PLAYING){
        playing=true; btn.innerText='⏸'; lp.classList.add('spin-lp');
        const idx=ytP.getPlaylistIndex();
        if(TRACKS[idx]){ nm.innerText=TRACKS[idx].title; img.src=`https://img.youtube.com/vi/${TRACKS[idx].id}/hqdefault.jpg`; }
      } else { playing=false; btn.innerText='▶'; lp.classList.remove('spin-lp'); }
    },
    onError:e=>console.warn('YT err',e.data)
  }});
}
function togglePlay(){ if(!ytP) return; playing ? ytP.pauseVideo() : ytP.playVideo(); }
function nextTrack(){ if(ytP&&ytP.nextVideo) ytP.nextVideo(); }
function toggleCtrl(){ document.getElementById('pCtrl').classList.toggle('show'); }

// ════════════════════════════════════════════════
//  Config
// ════════════════════════════════════════════════
const SERVICE_KEY = '556f51685a656f64333561785a7054';
const BUS_ROUTE_ID = '100100098';          // 653번 노선 ID
const ARS_UP   = '16328';                  // 강서한방병원 ARS ID
const ARS_DN   = '18109';                  // 로옴코리아 ARS ID
const COORD_UP = [37.5301, 126.8390];      // 강서한방병원 좌표
const COORD_DN = [37.4795, 126.8800];      // 로옴코리아 좌표

// CORS 우회 프록시 목록 (순서대로 시도)
const PROXIES = [
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`
];

let routeCoords=[], idxUp=0, idxDn=0;
let busMarkers={}, demoMode=true;
let busDataList=[];
const DEMO_SECS = 1800;

// ════════════════════════════════════════════════
//  Map init
// ════════════════════════════════════════════════
const map = L.map('map',{zoomControl:false}).setView(COORD_UP,13);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(map);

let polyFull = L.polyline([COORD_UP,COORD_DN],{color:'#cbd5e1',weight:5,opacity:.6}).addTo(map);
let polyUp   = L.polyline([COORD_UP,COORD_DN],{color:'#3b82f6',weight:6,opacity:.9,dashArray:'1,1'}).addTo(map);
let polyDn   = L.polyline([COORD_UP,COORD_DN],{color:'#f97316',weight:6,opacity:.9,dashArray:'1,1'}).addTo(map);

function mkStnLabel(html, latlng, anchor){
  return L.marker(latlng,{icon:L.divIcon({className:'stn-icon',html:`<div class="stn-label">${html}</div>`,iconAnchor:anchor})}).addTo(map);
}
mkStnLabel("<div class='badge up'>📍 출근 탑승</div><div>강서한방병원</div>",  COORD_UP, [50,-10]);
mkStnLabel("<div class='badge dn'>📍 퇴근 탑승</div><div>로옴코리아</div>",    COORD_DN, [50, 40]);

// ════════════════════════════════════════════════
//  OSRM 실제 도로 경로
// ════════════════════════════════════════════════
async function loadOSRM(){
  setLoad('지도에 실제 도로 경로를 그리는 중…');
  try {
    const url = 'https://router.project-osrm.org/route/v1/driving/126.8270,37.5510;126.8390,37.5301;126.8800,37.4795?geometries=geojson&overview=full';
    const r = await fetch(url);
    const d = await r.json();
    const coords = d.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]);
    routeCoords = coords;

    const closest = t => { let mi=Infinity,idx=0; coords.forEach((c,i)=>{ let d=Math.hypot(c[0]-t[0],c[1]-t[1]); if(d<mi){mi=d;idx=i;} }); return idx; };
    idxUp = closest(COORD_UP);
    idxDn = closest(COORD_DN);

    // 전체 회색 선
    polyFull.setLatLngs(coords);
    // 상행 (강서한방병원까지) — 파란선
    polyUp.setLatLngs(coords.slice(0, idxUp+1));
    // 하행 (강서→가산) — 주황선
    polyDn.setLatLngs(coords.slice(idxUp, idxDn+1));

    map.fitBounds(L.latLngBounds(coords),{padding:[50,50]});
    return true;
  } catch(e) {
    console.warn('OSRM 실패',e);
    return false;
  }
}

// ════════════════════════════════════════════════
//  API 호출 (정류장 도착 예정 — getStationByUid)
// ════════════════════════════════════════════════
async function proxyFetch(rawUrl){
  for(const p of PROXIES){
    try {
      const r = await fetch(p(rawUrl),{signal:AbortSignal.timeout(6000)});
      if(!r.ok) continue;
      const txt = await r.text();
      // corsproxy.io 는 raw 반환, codetabs 도 raw 반환
      return JSON.parse(txt);
    } catch(e){ console.warn('proxy fail',e); }
  }
  throw new Error('모든 프록시 실패');
}

async function fetchArrival(arsId){
  const url = `http://ws.bus.go.kr/api/rest/stationinfo/getStationByUid?ServiceKey=${SERVICE_KEY}&arsId=${arsId}&resultType=json`;
  const data = await proxyFetch(url);
  if(data.msgHeader?.headerCd !== '0') throw new Error(data.msgHeader?.headerMsg);
  return data.msgBody?.itemList ?? [];
}

async function fetchBus(){
  setLoad('실시간 버스 데이터 불러오는 중…');
  try {
    const [upItems, dnItems] = await Promise.all([
      fetchArrival(ARS_UP),
      fetchArrival(ARS_DN)
    ]);

    const newList = [];

    // 강서한방병원 (상행 653번 필터)
    const upBus = upItems.filter(i => i.busRouteId===BUS_ROUTE_ID || i.rtNm==='653');
    upBus.forEach((item,idx) => {
      const t1=parseInt(item.traTime1)||0, t2=parseInt(item.traTime2)||0;
      if(t1>0) newList.push({id:`up_1_${idx}`, sec:t1, dir:'up',  stNm:item.stNm||'', veh:item.vehId1||''});
      if(t2>0) newList.push({id:`up_2_${idx}`, sec:t2, dir:'up',  stNm:item.stNm||'', veh:item.vehId2||''});
    });

    // 로옴코리아 (하행 653번 필터)
    const dnBus = dnItems.filter(i => i.busRouteId===BUS_ROUTE_ID || i.rtNm==='653');
    dnBus.forEach((item,idx) => {
      const t1=parseInt(item.traTime1)||0, t2=parseInt(item.traTime2)||0;
      if(t1>0) newList.push({id:`dn_1_${idx}`, sec:t1, dir:'dn', stNm:item.stNm||'', veh:item.vehId1||''});
      if(t2>0) newList.push({id:`dn_2_${idx}`, sec:t2, dir:'dn', stNm:item.stNm||'', veh:item.vehId2||''});
    });

    if(newList.length > 0){
      busDataList = newList;
      demoMode = false;
      hideBanner();
      console.log('✅ 실시간 연동 성공', newList);
    } else {
      showBanner('도착 정보 없음 — 데모 모드');
    }
  } catch(e){
    console.error('❌ API 실패:', e);
    showBanner('API 연결 실패 — 데모 모드');
  } finally {
    hideLoad();
    renderAll();
  }
}

// ════════════════════════════════════════════════
//  지도 버스 마커 & UI 렌더
// ════════════════════════════════════════════════
function getPosByRatio(dir, ratio){
  if(!routeCoords.length) return dir==='up' ? COORD_UP : COORD_DN;
  const seg = dir==='up'
    ? routeCoords.slice(0, idxUp+1)
    : routeCoords.slice(idxUp, idxDn+1);
  if(!seg.length) return dir==='up' ? COORD_UP : COORD_DN;
  if(ratio<=0) return seg[0];
  if(ratio>=1) return seg[seg.length-1];
  let total=0, dists=[];
  for(let i=0;i<seg.length-1;i++){
    const d=Math.hypot(seg[i+1][0]-seg[i][0],seg[i+1][1]-seg[i][1]);
    total+=d; dists.push(d);
  }
  let target=total*ratio, cur=0;
  for(let i=0;i<seg.length-1;i++){
    if(cur+dists[i]>=target){
      const r=(target-cur)/dists[i];
      return [seg[i][0]+(seg[i+1][0]-seg[i][0])*r, seg[i][1]+(seg[i+1][1]-seg[i][1])*r];
    }
    cur+=dists[i];
  }
  return seg[seg.length-1];
}

function renderAll(){
  const active = busDataList.filter(b=>b.sec>=0);
  const curIds = active.map(b=>b.id);
  // 없어진 마커 제거
  Object.keys(busMarkers).forEach(k=>{ if(!curIds.includes(k)){ map.removeLayer(busMarkers[k]); delete busMarkers[k]; }});

  // 각 방향 가장 빠른 버스
  const fastUp = active.filter(b=>b.dir==='up').sort((a,b)=>a.sec-b.sec)[0];
  const fastDn = active.filter(b=>b.dir==='dn').sort((a,b)=>a.sec-b.sec)[0];

  // 하단 패널 업데이트
  updatePanel('up', fastUp);
  updatePanel('dn', fastDn);

  // 노선 색상 업데이트 (도착 임박 빨강, 여유 파랑/주황)
  if(fastUp){ const m=Math.floor(fastUp.sec/60); polyUp.setStyle({color: m<=5?'#ef4444':'#3b82f6'}); }
  if(fastDn){ const m=Math.floor(fastDn.sec/60); polyDn.setStyle({color: m<=5?'#ef4444':'#f97316'}); }

  // 버스 마커
  active.forEach(bus=>{
    const mins  = Math.floor(bus.sec/60);
    const isRed = mins<=5;
    const ratio = Math.max(0.02, Math.min(0.98, 1 - bus.sec/DEMO_SECS));
    const pos   = getPosByRatio(bus.dir, ratio);
    const bubbleCls = isRed ? 'red' : 'grn';
    const html = `<div class="bus-marker"><div class="bus-bubble ${bubbleCls}">${isRed?'🚨':''} ${mins}분</div>` +
      `<svg width="38" height="48" viewBox="0 0 40 50" fill="none" xmlns="http://www.w3.org/2000/svg">` +
      `<path d="M20 0C8.954 0 0 8.954 0 20C0 35 20 50 20 50S40 35 40 20C40 8.954 31.046 0 20 0Z" fill="${isRed?'#ef4444':bus.dir==='up'?'#3b82f6':'#f97316'}"/>` +
      `<path d="M12 16h16v10H12zM14 27a2 2 0 100-4 2 2 0 000 4zm8 0a2 2 0 100-4 2 2 0 000 4z" fill="white"/></svg></div>`;
    const icon = L.divIcon({className:'custom-icon', html, iconSize:[60,80], iconAnchor:[30,75]});
    if(!busMarkers[bus.id]) busMarkers[bus.id]=L.marker(pos,{icon}).addTo(map);
    else { busMarkers[bus.id].setLatLng(pos); busMarkers[bus.id].setIcon(icon); }
  });
}

function updatePanel(dir, bus){
  const tEl = document.getElementById(dir==='up'?'t-up':'t-dn');
  const sEl = document.getElementById(dir==='up'?'s-up':'s-dn');
  if(bus){
    const m = Math.max(0,Math.floor(bus.sec/60));
    const s = bus.sec%60;
    tEl.innerText = m > 0 ? `${m}분` : `${s}초`;
    tEl.className = 'val ' + (m<=5 ? 'red' : 'green');
    sEl.innerText = bus.stNm ? `현재: ${bus.stNm}` : (m<=5?'⚠️ 곧 도착':'정상 운행 중');
  } else {
    tEl.innerText='정보없음'; tEl.className='val'; sEl.innerText='운행 정보 없음';
  }
}

// ════════════════════════════════════════════════
//  Demo buses
// ════════════════════════════════════════════════
function initDemo(){
  busDataList = [
    {id:'d_up1', sec:240,  dir:'up', stNm:'화곡역',   veh:'', _demo:true},
    {id:'d_up2', sec:900,  dir:'up', stNm:'우장산역', veh:'', _demo:true},
    {id:'d_dn1', sec:360,  dir:'dn', stNm:'가산디지털단지', veh:'', _demo:true},
    {id:'d_dn2', sec:1200, dir:'dn', stNm:'남구로역', veh:'', _demo:true}
  ];
}

// 1초 카운트다운
setInterval(()=>{
  busDataList.forEach(b=>{
    if(b.sec>0) b.sec--;
    if(b._demo && b.sec<=0) b.sec=DEMO_SECS;
  });
  renderAll();
},1000);

// 30초마다 API 재시도
setInterval(fetchBus, 30000);

// ════════════════════════════════════════════════
//  Banner & Loading helpers
// ════════════════════════════════════════════════
function showBanner(msg){
  let b=document.getElementById('demo-banner');
  if(!b){ b=document.createElement('div'); b.id='demo-banner'; document.body.prepend(b); }
  const now=new Date(), s=new Date(now.getTime()+2*3600000);
  const hh=String(s.getHours()).padStart(2,'0'), mm=String(s.getMinutes()).padStart(2,'0');
  b.innerHTML=`🚌 데모 모드 | ${msg} — API 동기화 예상: ${hh}:${mm}`;
}
function hideBanner(){ const b=document.getElementById('demo-banner'); if(b) b.remove(); }
function setLoad(t){ document.getElementById('loadTxt').innerText=t; document.getElementById('loading').classList.add('on'); }
function hideLoad(){ document.getElementById('loading').classList.remove('on'); }

// ════════════════════════════════════════════════
//  App start
// ════════════════════════════════════════════════
async function init(){
  await loadOSRM();
  initDemo();
  showBanner('데모 버스 표시 중');
  renderAll();
  await fetchBus();
}
init();
</script>
